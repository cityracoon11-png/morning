<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Good Morning Khub ❤️</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(to top, #ff9a9e, #fecfef);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      color: white;
    }

    .card {
      background: rgba(255, 255, 255, 0.15);
      padding: 30px;
      border-radius: 20px;
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      animation: fadeIn 2s ease;
    }

    h1 {
      font-size: 40px;
      margin-bottom: 10px;
    }

    p {
      font-size: 18px;
      margin-bottom: 20px;
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      background: white;
      color: #66a6ff;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #f0f0f0;
    }

    .hidden {
      display: none;
      margin-top: 20px;
      font-size: 16px;
    }

    @keyframes fadeIn {
      from {opacity: 0; transform: translateY(20px);}
      to {opacity: 1; transform: translateY(0);}
    }
  </style>
</head>
<script>
function showMessage() {
  document.getElementById("message").style.display = "block";

  const audio = document.getElementById("bgm");
  if (audio) {
    audio.play().catch(() => {});
  }
}
</script>
<body>

<!-- Musik -->
<audio id="bgm" loop>
  <source src="shake it off.mp3" type="audio/mpeg">
</audio>

<div class="card">
  <h1>Good Morning ☀️</h1>
  <p>hope your day its a good day khubb 🤗</p>
  
  <button onclick="showMessage()" style="display:flex; align-items:center; gap:8px;">
  Klik ini 
 <img src="bear.gif">
       
</button>

  <div id="message" class="hidden">
    <p>
      I just wanna say...<br><br>
      Hope your day goes smoothly, don't forget your smile,  
      and when you're tired... eat good food okay,God Bless You Pretty Chubby Cheeks🤏🏻❤️
    </p>
  </div>
</div>

<script>
function showMessage() {
  document.getElementById("message").style.display = "block";

  const audio = document.getElementById("bgm");
  audio.play().catch(() => {});
}
</script>

</body>
</html>
